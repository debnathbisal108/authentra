databases:
  - name: authentra-db
    databaseName: authentra
    user: authentra
    plan: free

services:
  # Redis (using Render's free Redis)
  - type: redis
    name: authentra-redis
    plan: free
    ipAllowList: []

  # Backend API
  - type: web
    name: authentra-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: authentra-db
          property: connectionString
      - key: SYNC_DATABASE_URL
        fromDatabase:
          name: authentra-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: authentra-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: authentra-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: authentra-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
    buildCommand: pip install -r requirements.txt
    startCommand: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT"

  # Celery Worker
  - type: worker
    name: authentra-celery-worker
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: authentra-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: authentra-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: authentra-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: authentra-redis
          property: connectionString
      - key: SECRET_KEY
        fromService:
          type: web
          name: authentra-backend
          envVarKey: SECRET_KEY
      - key: JWT_SECRET_KEY
        fromService:
          type: web
          name: authentra-backend
          envVarKey: JWT_SECRET_KEY
      - key: ENCRYPTION_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
    startCommand: >
      celery -A app.tasks.celery_app worker
      --loglevel=info
      --queues=resume_parsing,consent_email,employment_verification,education_verification,fraud_analysis,risk_scoring,followups
      --concurrency=2

  # Frontend
  - type: web
    name: authentra-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: authentra-backend
          property: host
